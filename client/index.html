<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StableLobster - The Consumer Reports for AI Agents. Real-time status monitoring for OpenClaw versions." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>StableLobster 🦞</title>
    <script>
      // Theme initialization - matches openclaw.ai exactly
      (function() {
        const key = 'oc-theme';
        const saved = localStorage.getItem(key);
        const theme = saved === 'light' || saved === 'dark' ? saved : 'dark';
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
